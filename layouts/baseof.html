<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
{{- if .HasShortcode "gallery" }}
{{ partial "gallery/head.html" . }}
{{- end }}
{{ partial "head.html" . }}
</head>
<body class="font-serif">
  <header>
    {{ partial "header.html" . }}
  </header>
  <main class="flex flex-col justify-center items-center px-3">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="flex flex-col items-center py-5">
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
